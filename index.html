<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cardContainer"></div>

    <dialog id="dialog">
        <form method="dialog">
            <div id="inputContainer">
                <label> Title:
                    <input type="text" id="titleInput" required>
                </label>
                <label> Author:
                    <input type="text" id="authorInput" required>
                </label>
                <label> Page Number:
                    <input type="number" id="pageNumberInput" required>
                </label>
                <label> Read Status:
                    <select name="status" id="readStatusInput">
                        <option value="Read">Read</option>
                        <option value="Not Read">Not Read</option>
                    </select>
                </label>
            </div>
                <input type="submit" id="submitBtn">
                <input type="submit" id="closeBtn" value="Close">
        </form>
    </dialog>
    <button id="newBookBtn">Enter New Book</button>
    <script src="script.js"></script>
</body>
</html>
